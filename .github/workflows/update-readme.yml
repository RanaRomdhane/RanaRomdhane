name: Auto Refresh GitHub Stats

on:
  schedule:
    - cron: '*/10 * * * *' # toutes les 10 minutes
  workflow_dispatch:

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update GitHub stats URL with timestamp
        run: |
          sed -i "s|https://github-readme-stats-three-eta-66.vercel.app/api?username=ranaromdhane.*|https://github-readme-stats-three-eta-66.vercel.app/api?username=ranaromdhane&count_private=true&theme=jolly&hide_border=true&show_icons=true&v=$(date +%s)|" README.md

      - name: Commit changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Auto-refresh GitHub stats" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
